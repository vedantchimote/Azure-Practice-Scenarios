#cloud-config
# =============================================================================
# Cloud-Init — Apache2 Installation & Web Page Deployment
# =============================================================================
# This script runs ONCE on the first boot of each VM.
# It installs Apache2 and deploys a custom landing page.

package_update: true
package_upgrade: true

packages:
  - apache2
  - curl

runcmd:
  # Ensure Apache is enabled and started
  - systemctl enable apache2
  - systemctl start apache2

  # Deploy the landing page
  - |
    cat > /var/www/html/index.html << 'WEBPAGE'
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Azure Web Demo</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
          color: #e0e0e0;
          overflow: hidden;
        }

        .bg-orbs {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          pointer-events: none; z-index: 0;
        }
        .orb {
          position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
          animation: float 8s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6c63ff; top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #00d2ff; bottom: -80px; right: -80px; animation-delay: -3s; }
        .orb-3 { width: 200px; height: 200px; background: #ff6584; top: 50%; left: 60%; animation-delay: -5s; }

        @keyframes float {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-30px) scale(1.05); }
        }

        .card {
          position: relative; z-index: 1;
          background: rgba(255, 255, 255, 0.05);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 24px;
          padding: 3rem 3.5rem;
          max-width: 600px;
          text-align: center;
          box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
          animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(40px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .badge {
          display: inline-block;
          background: linear-gradient(135deg, #6c63ff, #00d2ff);
          color: #fff;
          padding: 0.35rem 1rem;
          border-radius: 50px;
          font-size: 0.75rem;
          font-weight: 600;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          margin-bottom: 1.5rem;
        }

        h1 {
          font-size: 2.2rem;
          font-weight: 700;
          margin-bottom: 0.75rem;
          background: linear-gradient(to right, #ffffff, #a78bfa);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .subtitle {
          font-size: 1.05rem;
          color: #a0a0b8;
          line-height: 1.6;
          margin-bottom: 2rem;
        }

        .info-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 1rem;
          margin-bottom: 2rem;
        }

        .info-item {
          background: rgba(255, 255, 255, 0.04);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 14px;
          padding: 1rem;
          transition: transform 0.2s, border-color 0.2s;
        }
        .info-item:hover {
          transform: translateY(-2px);
          border-color: rgba(108, 99, 255, 0.4);
        }

        .info-label {
          font-size: 0.7rem;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: #6c63ff;
          font-weight: 600;
          margin-bottom: 0.3rem;
        }

        .info-value {
          font-size: 0.95rem;
          color: #d0d0e0;
          font-weight: 400;
        }

        .status {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          background: rgba(16, 185, 129, 0.1);
          border: 1px solid rgba(16, 185, 129, 0.3);
          border-radius: 50px;
          padding: 0.5rem 1.2rem;
          font-size: 0.85rem;
          color: #10b981;
          font-weight: 500;
        }

        .pulse {
          width: 8px; height: 8px;
          background: #10b981;
          border-radius: 50%;
          animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
          0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
          50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        }

        .footer {
          margin-top: 2rem;
          font-size: 0.75rem;
          color: #555570;
        }

        @media (max-width: 520px) {
          .card { padding: 2rem 1.5rem; margin: 1rem; }
          h1 { font-size: 1.6rem; }
          .info-grid { grid-template-columns: 1fr; }
        }
      </style>
    </head>
    <body>
      <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>

      <div class="card">
        <span class="badge">Azure Cloud Lab</span>
        <h1>Hello from Azure! 🚀</h1>
        <p class="subtitle">
          This page is served by <strong>Apache2</strong> running on an Azure VM,
          deployed behind a <strong>Standard Load Balancer</strong> using Terraform.
        </p>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">VM Name</div>
            <div class="info-value">${vm_name}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Instance</div>
            <div class="info-value">#${vm_index}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Web Server</div>
            <div class="info-value">Apache 2.4</div>
          </div>
          <div class="info-item">
            <div class="info-label">OS</div>
            <div class="info-value">Ubuntu 22.04 LTS</div>
          </div>
        </div>

        <div class="status">
          <div class="pulse"></div>
          Server is healthy
        </div>

        <p class="footer">
          Infrastructure managed by Terraform &bull; Azure Cloud
        </p>
      </div>
    </body>
    </html>
    WEBPAGE

  # Restart Apache to ensure everything is clean
  - systemctl restart apache2
